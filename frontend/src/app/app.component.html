@if (globalError.message()) {
  <div class="global-error">
    <span class="global-error-text">{{ globalError.message() }}</span>
    <button type="button" class="global-error-dismiss" (click)="globalError.clear()" aria-label="Cerrar">×</button>
  </div>
}

<div class="shell" [class.sidebar-collapsed]="collapsed()">
  <aside class="sidebar">
    <a routerLink="/" class="brand">
      <img class="brand-logo" src="logo.png" alt="Zona Cuaderno" />
      @if (!collapsed()) {
        <span class="brand-text">
          <span class="brand-name">Zona Cuaderno</span>
          <span class="brand-sub">Hub de ventas</span>
        </span>
      }
    </a>

    <nav class="nav">
      @for (item of nav; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: !!item.exact }"
          class="nav-item"
          [title]="collapsed() ? item.label : ''"
        >
          <i class="ti {{ item.icon }}"></i>
          @if (!collapsed()) {
            <span>{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <div class="sidebar-foot">
      <button
        type="button"
        class="nav-item theme-toggle"
        (click)="theme.toggle()"
        [title]="collapsed() ? (theme.theme() === 'light' ? 'Modo oscuro' : 'Modo claro') : ''"
      >
        <i class="ti" [class.ti-moon]="theme.theme() === 'light'" [class.ti-sun]="theme.theme() === 'dark'"></i>
        @if (!collapsed()) {
          <span>{{ theme.theme() === 'light' ? 'Modo oscuro' : 'Modo claro' }}</span>
        }
      </button>
      <div class="user-chip" [title]="collapsed() ? 'Mica' : ''">
        <span class="avatar">MD</span>
        @if (!collapsed()) {
          <span class="user-name">Mica</span>
        }
      </div>
      <button
        type="button"
        class="nav-item collapse-toggle"
        (click)="toggleSidebar()"
        [title]="collapsed() ? 'Expandir panel' : 'Colapsar panel'"
        aria-label="Colapsar panel"
      >
        <i class="ti" [class.ti-layout-sidebar-left-collapse]="!collapsed()" [class.ti-layout-sidebar-left-expand]="collapsed()"></i>
        @if (!collapsed()) {
          <span>Colapsar panel</span>
        }
      </button>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>

# Deploy del frontend (carpeta frontend) a GitHub Pages.
# Requiere: Settings → Secrets → BACKEND_API_URL = https://TU-DOMINIO.up.railway.app/api
# Y: Settings → Pages → Source = GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Inyectar BACKEND_API_URL en environment.prod (antes del build)
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: |
          if [ -z "$BACKEND_API_URL" ]; then echo "ERROR: Falta el secreto BACKEND_API_URL en Settings → Secrets"; exit 1; fi
          sed -i "s|__BACKEND_API_URL__|$BACKEND_API_URL|g" frontend/src/environments/environment.prod.ts

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (config github = baseHref para Pages)
        run: npm run build:github
        working-directory: frontend

      - name: Definir ruta del build para Pages
        run: |
          DIR="frontend/dist/frontend"
          if [ -d "${DIR}/browser" ]; then DIR="${DIR}/browser"; fi
          echo "DEPLOY_PATH=$DIR" >> $GITHUB_ENV

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_PATH }}

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
